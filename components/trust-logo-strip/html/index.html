<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TrustLogoStrip example</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <section class="tls">
    <p class="tls__eyebrow">Trusted by teams at</p>
    <ul class="tls__list">
      <li class="tls__item">
        <img class="tls__logo" src="https://via.placeholder.com/120x40?text=Acme" alt="Acme Corp" loading="lazy">
      </li>
      <li class="tls__item">
        <img class="tls__logo" src="https://via.placeholder.com/120x40?text=Globex" alt="Globex" loading="lazy">
      </li>
      <li class="tls__item">
        <a class="tls__item-link" href="https://stripe.com" target="_blank" rel="noopener noreferrer">
          <img class="tls__logo" src="https://via.placeholder.com/120x40?text=Stripe" alt="Stripe" loading="lazy">
        </a>
      </li>
      <li class="tls__item">
        <img class="tls__logo" src="https://via.placeholder.com/120x40?text=Initech" alt="Initech" loading="lazy">
      </li>
    </ul>
  </section>
</body>
</html>
