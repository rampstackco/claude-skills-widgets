<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FeaturedInPressStrip example</title>
  <link rel="stylesheet" href="../../trust-logo-strip/styles.css">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

  <!-- Color variant (default): press logos displayed in full color -->
  <section class="tls fips fips--color">
    <p class="tls__eyebrow">Featured in</p>
    <ul class="tls__list">
      <li class="tls__item">
        <img class="tls__logo" src="https://via.placeholder.com/120x40?text=Daily+Ledger" alt="The Daily Ledger" loading="lazy">
      </li>
      <li class="tls__item">
        <img class="tls__logo" src="https://via.placeholder.com/120x40?text=Tech+Review" alt="Tech Review Weekly" loading="lazy">
      </li>
      <li class="tls__item">
        <img class="tls__logo" src="https://via.placeholder.com/120x40?text=Metro+Biz" alt="Metro Business" loading="lazy">
      </li>
      <li class="tls__item">
        <img class="tls__logo" src="https://via.placeholder.com/120x40?text=Broadsheet" alt="The Broadsheet" loading="lazy">
      </li>
      <li class="tls__item">
        <img class="tls__logo" src="https://via.placeholder.com/120x40?text=Cap+Journal" alt="Capital Journal" loading="lazy">
      </li>
    </ul>
  </section>

  <!-- Grayscale variant: showColor false, inherits TrustLogoStrip grayscale defaults -->
  <section class="tls fips">
    <p class="tls__eyebrow">As seen in</p>
    <ul class="tls__list">
      <li class="tls__item">
        <img class="tls__logo" src="https://via.placeholder.com/120x40?text=Daily+Ledger" alt="The Daily Ledger" loading="lazy">
      </li>
      <li class="tls__item">
        <img class="tls__logo" src="https://via.placeholder.com/120x40?text=Tech+Review" alt="Tech Review Weekly" loading="lazy">
      </li>
      <li class="tls__item">
        <img class="tls__logo" src="https://via.placeholder.com/120x40?text=Metro+Biz" alt="Metro Business" loading="lazy">
      </li>
      <li class="tls__item">
        <a class="tls__item-link" href="https://example.com" target="_blank" rel="noopener noreferrer">
          <img class="tls__logo" src="https://via.placeholder.com/120x40?text=Broadsheet" alt="The Broadsheet" loading="lazy">
        </a>
      </li>
    </ul>
  </section>

</body>
</html>
