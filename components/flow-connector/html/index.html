<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FlowConnector example</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    body {
      font-family: system-ui, sans-serif;
      padding: 2rem;
      background: #fff;
      color: #111;
    }

    h2 {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #6b7280;
      margin: 0 0 1rem;
    }

    .demo-row {
      display: flex;
      align-items: center;
      margin-bottom: 3rem;
    }

    .demo-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 3rem;
    }

    .card {
      padding: 1rem 1.5rem;
      background: #f3f4f6;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .card--wide {
      width: 140px;
      text-align: center;
    }
  </style>
</head>
<body>

  <h2>Horizontal</h2>
  <div class="demo-row">
    <div class="card">Step 1</div>

    <div class="fc fc--horizontal" aria-hidden="true">
      <svg width="48" height="20" viewBox="0 0 48 20" fill="none">
        <line x1="4" y1="10" x2="38" y2="10"
              stroke="var(--fc-line-color)" stroke-width="var(--fc-stroke-width)"
              stroke-dasharray="2 3" />
        <circle cx="4" cy="10" r="2" fill="var(--fc-accent-color)" />
        <path d="M 38 6 L 44 10 L 38 14"
              stroke="var(--fc-accent-color)" stroke-width="var(--fc-stroke-width)"
              stroke-linecap="round" stroke-linejoin="round" fill="none" />
      </svg>
    </div>

    <div class="card">Step 2</div>

    <div class="fc fc--horizontal" aria-hidden="true">
      <svg width="48" height="20" viewBox="0 0 48 20" fill="none">
        <line x1="4" y1="10" x2="38" y2="10"
              stroke="var(--fc-line-color)" stroke-width="var(--fc-stroke-width)"
              stroke-dasharray="2 3" />
        <circle cx="4" cy="10" r="2" fill="var(--fc-accent-color)" />
        <path d="M 38 6 L 44 10 L 38 14"
              stroke="var(--fc-accent-color)" stroke-width="var(--fc-stroke-width)"
              stroke-linecap="round" stroke-linejoin="round" fill="none" />
      </svg>
    </div>

    <div class="card">Step 3</div>
  </div>

  <h2>Vertical</h2>
  <div class="demo-col">
    <div class="card card--wide">Stage A</div>

    <div class="fc fc--vertical" aria-hidden="true">
      <svg width="20" height="32" viewBox="0 0 20 32" fill="none">
        <line x1="10" y1="4" x2="10" y2="22"
              stroke="var(--fc-line-color)" stroke-width="var(--fc-stroke-width)"
              stroke-dasharray="2 3" />
        <circle cx="10" cy="4" r="2" fill="var(--fc-accent-color)" />
        <path d="M 6 22 L 10 28 L 14 22"
              stroke="var(--fc-accent-color)" stroke-width="var(--fc-stroke-width)"
              stroke-linecap="round" stroke-linejoin="round" fill="none" />
      </svg>
    </div>

    <div class="card card--wide">Stage B</div>

    <div class="fc fc--vertical" aria-hidden="true">
      <svg width="20" height="32" viewBox="0 0 20 32" fill="none">
        <line x1="10" y1="4" x2="10" y2="22"
              stroke="var(--fc-line-color)" stroke-width="var(--fc-stroke-width)"
              stroke-dasharray="2 3" />
        <circle cx="10" cy="4" r="2" fill="var(--fc-accent-color)" />
        <path d="M 6 22 L 10 28 L 14 22"
              stroke="var(--fc-accent-color)" stroke-width="var(--fc-stroke-width)"
              stroke-linecap="round" stroke-linejoin="round" fill="none" />
      </svg>
    </div>

    <div class="card card--wide">Stage C</div>
  </div>

  <h2>Custom colors (overriding CSS variables)</h2>
  <div class="demo-row" style="--fc-line-color: #d1d5db; --fc-accent-color: #2563eb;">
    <div class="card">Source</div>

    <div class="fc fc--horizontal" aria-hidden="true">
      <svg width="48" height="20" viewBox="0 0 48 20" fill="none">
        <line x1="4" y1="10" x2="38" y2="10"
              stroke="var(--fc-line-color)" stroke-width="var(--fc-stroke-width)"
              stroke-dasharray="2 3" />
        <circle cx="4" cy="10" r="2" fill="var(--fc-accent-color)" />
        <path d="M 38 6 L 44 10 L 38 14"
              stroke="var(--fc-accent-color)" stroke-width="var(--fc-stroke-width)"
              stroke-linecap="round" stroke-linejoin="round" fill="none" />
      </svg>
    </div>

    <div class="card">Destination</div>
  </div>

</body>
</html>
